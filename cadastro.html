<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/cadastro.css">
    <title>Cadastro</title>
</head>
<body>
    
    <main>
        <div class="contender-cadastro">
            <h2>Criar Conta</h2>
            <div class="conteudo-cadastro">
                <input type="text" placeholder="Nome Completo" id="input-name">
                <input type="email" placeholder="E-mail" id="input-email">
                <input type="password" placeholder="Senha" id="input-senha">
                <input type="password" placeholder="Confirmar Senha" id="input-confirmar-senha">
                <div>
                    <input type="checkbox" name="checkbox" id="checkbox">
                    <label for="checkbox">Concordo com os termos e condições.</label>
                </div>
                <input type="button" value="Cadastrar" id="button-cadastrar">
            </div>
        </div>
    </main>


    <footer>
        <div class="botoes-footer">
            <button class="button-footer"><b>Instagram</b></button>
            <button class="button-footer"><b>Work</b></button>
            <button class="button-footer"><b>Bags</b></button>
            <button class="button-footer"><b>Lamp</b></button>
            <button class="button-footer"><b>Books</b></button>
        </div>
        <br>
        <p>© 2025 Meu Site • Meu site</p>
    </footer>
</body>
</html>
