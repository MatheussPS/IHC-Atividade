<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/global.css" />
    <title>Habit</title>
  </head>

  <body>
    <header class="header">
      <div class="header-content">
        <div class="logo-nav">
          <h1 class="logo-text">
            <a href="/">HABIT</a>
          </h1>

          <nav>
            <ul class="nav-ul">
              <li><a href="#">Início</a></li>
              <li><a href="#">Páginas</a></li>
              <li><a href="#">Destaques</a></li>
              <li><a href="#">Assinar</a></li>
              <li><a href="#">Admin</a></li>
            </ul>
          </nav>
        </div>

        <div class="actions-container">
          <form>
            <input
              id="search-input"
              type="text"
              class="header-search-input"
              placeholder="Buscar..."
              aria-label="Buscar"
            />
          </form>

          <button class="header-btn search-btn">Buscar</button>
          <button class="header-btn login-btn">Entrar</button>
        </div>
        <button class="menu-btn">
          <img
            class="hambuguer-img"
            src="img/hamburguer.png"
            alt="Imagem do menu"
          />
        </button>
      </div>
    </header>
    <main>
      <section id="dashboard"></section>
    </main>
    <footer>
      <div class="botoes-footer">
        <button class="button-footer"><b>Instagram</b></button>
        <button class="button-footer"><b>Work</b></button>
        <button class="button-footer"><b>Bags</b></button>
        <button class="button-footer"><b>Lamp</b></button>
        <button class="button-footer"><b>Books</b></button>
      </div>
      <br />
      <p>© 2025 Meu Site • Meu site</p>
    </footer>
  </body>
</html>
